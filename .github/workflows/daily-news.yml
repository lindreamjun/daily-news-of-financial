name: Daily News Report

on:
  schedule:
    # Every day at 1:00 UTC (9:00 AM Beijing Time)
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  collect-and-send:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      
      - name: Create logs directory
        run: mkdir -p logs
      
      - name: Install dependencies with verbose output
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -v
      
      - name: Debug - Check Python environment
        run: |
          python --version
          pip list
          echo "Current directory:"
          pwd
          echo "Files in repo:"
          ls -la
          echo "Config file check:"
          ls -la config/
          ls -la scripts/
      
      - name: Collect news and send email
        env:
          EMAIL_RECIPIENT: ${{ secrets.EMAIL_RECIPIENT }}
          SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          PYTHONUNBUFFERED: 1
        run: |
          echo "Starting script..."
          python -u scripts/collect_news.py 2>&1 || echo "Script failed with exit code $?"
      
      - name: Show logs
        if: always()
        run: |
          echo "=== Log files ==="
          ls -la logs/ 2>/dev/null || echo "No logs directory"
          echo "=== Log content ==="
          cat logs/*.log 2>/dev/null || echo "No log files found"
      
      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: news-collection-logs
          path: logs/
          retention-days: 7
